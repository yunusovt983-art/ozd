# W9 Phase 2: Kubo + go-ds-s3 → ozd (полная интеграция)
#
# Архитектура:
#   Kubo + go-ds-s3 plugin
#     ├─ /blocks → S3 API → ozd:9100 (blockstore: R=2 mirror, 3 tmpfs)
#     └─ /       → leveldb (metadata, pins)
#
# Запуск:
#   docker compose up --build
#   ipfs --api=/ip4/127.0.0.1/tcp/5001 add <file>
#   ./scripts/kubo_smoke.sh http://localhost:9100
#
# Для production: заменить tmpfs на реальные ZFS-датасеты в ozd-docker.toml.

services:
  ozd:
    container_name: ozd
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.ozd
    ports:
      - "9100:9100"
    tmpfs:
      - /data/disk0
      - /data/disk1
      - /data/disk2
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9100/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10

  kubo:
    container_name: kubo
    build:
      context: .
      dockerfile: Dockerfile.kubo
    depends_on:
      ozd:
        condition: service_healthy
    ports:
      - "5001:5001"   # API
      - "4001:4001"   # Swarm (libp2p)
      - "8080:8080"   # Gateway
    environment:
      - OZD_S3_ENDPOINT=http://ozd:9100
      - OZD_S3_BUCKET=kubo
      - OZD_S3_ACCESS_KEY=minioadmin
      - OZD_S3_SECRET_KEY=minioadmin
    volumes:
      - kubo-data:/data/ipfs

volumes:
  kubo-data:
