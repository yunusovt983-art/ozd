name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # W7.4: bench smoke (быстрый, не regression — проверяем что бинарь собирается и работает)
      - run: cargo run -p ozd-bench --release -- --disks=4 --objects=50 --reads=100 --seed=1
